version: '3'

info:
  productName: "Forte"
  productIdentifier: "io.github.willfish.forte"
  description: "A modern music player"
  copyright: "(c) 2026, William Fish"
  version: "0.1.0"

dev_mode:
  root_path: .
  log_level: warn
  debounce: 1000
  ignore:
    dir:
      - .git
      - .direnv
      - .go
      - node_modules
      - frontend
      - bin
    file:
      - .DS_Store
      - .gitignore
      - .gitkeep
    watched_extension:
      - "*.go"
      - "*.js"
      - "*.ts"
    git_ignore: true
  executes:
    - cmd: wails3 build DEV=true EXTRA_TAGS=gtk4
      type: blocking
    - cmd: wails3 task common:dev:frontend
      type: background
    - cmd: wails3 task run
      type: primary

fileAssociations: []
